<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Codex Desktop Guard</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --line: #d9e0ea;
      --text: #16202a;
      --muted: #5f6b7a;
      --strong: #0f1720;
      --blue: #155eef;
      --blue-bg: #edf3ff;
      --green: #067647;
      --green-bg: #e8f6ef;
      --yellow: #8a6100;
      --yellow-bg: #fff4d6;
      --red: #b42318;
      --red-bg: #fdeceb;
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
    }

    button {
      font: inherit;
      letter-spacing: 0;
    }

    .page {
      max-width: 1240px;
      margin: 0 auto;
      padding: 24px 18px 36px;
    }

    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .title {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
      color: var(--strong);
    }

    .subtitle {
      margin-top: 6px;
      color: var(--muted);
      line-height: 1.5;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .button {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 7px 12px;
      cursor: pointer;
    }

    .button:hover {
      border-color: #b2bcc9;
    }

    .button.primary {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .button.primary:hover {
      background: #0f4fca;
    }

    .banner {
      display: none;
      margin-bottom: 16px;
      padding: 14px 16px;
      border-radius: 8px;
      border: 1px solid #b7d3c2;
      background: var(--green-bg);
      color: #115c3b;
      line-height: 1.5;
    }

    .error {
      display: none;
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid #efb8b2;
      background: var(--red-bg);
      color: var(--red);
    }

    .status-bar {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .status-card,
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .status-card {
      padding: 14px;
    }

    .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .value {
      color: var(--strong);
      font-size: 18px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .value.small {
      font-size: 15px;
      font-weight: 600;
    }

    .state-good { color: var(--green); }
    .state-wait { color: var(--yellow); }
    .state-bad { color: var(--red); }
    .state-info { color: var(--blue); }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
      gap: 16px;
    }

    .panel {
      padding: 16px;
      min-width: 0;
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 16px;
      color: var(--strong);
    }

    .kv {
      display: grid;
      grid-template-columns: 160px minmax(0, 1fr);
      gap: 10px 12px;
      align-items: start;
    }

    .k {
      color: var(--muted);
    }

    .v {
      color: var(--text);
      overflow-wrap: anywhere;
    }

    .hint {
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      background: var(--blue-bg);
      border: 1px solid #c5d8ff;
      color: #12306d;
      line-height: 1.5;
    }

    .command {
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      background: #101820;
      color: #e4edf8;
      font-family: Consolas, "Cascadia Mono", monospace;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      display: none;
    }

    .log {
      margin: 0;
      padding: 12px;
      border-radius: 8px;
      background: #101820;
      color: #d8e2ee;
      font-family: Consolas, "Cascadia Mono", monospace;
      font-size: 12px;
      line-height: 1.55;
      white-space: pre-wrap;
      max-height: 420px;
      overflow: auto;
    }

    .footer {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 980px) {
      .status-bar {
        grid-template-columns: 1fr 1fr;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .kv {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .header {
        flex-direction: column;
      }

      .toolbar {
        justify-content: flex-start;
      }

      .status-bar {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="header">
      <div>
        <h1 class="title">小守卫状态面板</h1>
        <div class="subtitle">Web 面板是主观察界面。计划任务和“立即检查”默认静默运行，不会弹 PowerShell 窗口。</div>
      </div>
      <div class="toolbar">
        <button class="button primary" id="refreshButton" type="button">Refresh</button>
        <button class="button" id="runCheckButton" type="button">Run Check Now</button>
        <button class="button" id="openLogsButton" type="button">Open Logs</button>
        <button class="button" id="openStagingButton" type="button">Open Staging</button>
      </div>
    </div>

    <div class="banner" id="restartBanner"></div>
    <div class="error" id="errorBox"></div>

    <section class="status-bar" aria-label="状态条">
      <div class="status-card">
        <div class="label">State</div>
        <div class="value" id="stateValue">读取中</div>
      </div>
      <div class="status-card">
        <div class="label">Step</div>
        <div class="value small" id="stepValue">-</div>
      </div>
      <div class="status-card">
        <div class="label">Last Run</div>
        <div class="value small" id="lastRunValue">-</div>
      </div>
      <div class="status-card">
        <div class="label">Safe</div>
        <div class="value small" id="safeValue">-</div>
      </div>
      <div class="status-card">
        <div class="label">Needs Action</div>
        <div class="value small" id="needsActionValue">-</div>
      </div>
    </section>

    <section class="grid">
      <div class="panel">
        <h2>当前任务卡</h2>
        <div class="kv" id="taskCard"></div>
        <div class="hint" id="userActionBox">状态读取完成后，这里会显示下一步动作。</div>
        <div class="command" id="applyCommandBox"></div>
      </div>

      <div class="panel">
        <h2>任务与来源</h2>
        <div class="kv" id="metaCard"></div>
        <div class="footer" id="checkedAtText">尚未刷新</div>
      </div>

      <div class="panel" style="grid-column: 1 / -1;">
        <h2>最近日志</h2>
        <pre class="log" id="logBox">暂无日志</pre>
      </div>
    </section>
  </main>

  <script>
    const stateNames = {
      not_installed: '未安装任务',
      idle: '空闲值班中',
      watching: '正在观察更新',
      config_change_only: '只发现配置变化',
      waiting_for_update_payload: '等待更新候选',
      waiting_for_external_payload: '等待外部来源',
      waiting_for_raw_package_source: '等待 raw 包来源',
      patched_update_ready: '补丁更新已就绪',
      current_version_ready: '当前版本保护包已就绪',
      ready: '补丁 staging 已就绪',
      needs_action: '需要人工处理',
      prepare_failed: '准备失败',
      unknown: '状态未知'
    };

    const stepNames = {
      waiting_for_restart: 'waiting_for_restart',
      ready_to_apply: 'ready_to_apply',
      acquiring_raw_package: 'acquiring_raw_package',
      discovering_update_candidate: 'discovering_update_candidate',
      watching_for_update_activity: 'watching_for_update_activity',
      config_change_only: 'config_change_only',
      manual_intervention_required: 'manual_intervention_required',
      idle: 'idle',
      prepare_failed: 'prepare_failed'
    };

    function byId(id) {
      return document.getElementById(id);
    }

    function text(value, fallback = '无') {
      if (value === null || value === undefined || value === '') {
        return fallback;
      }
      return String(value);
    }

    function yesNo(value) {
      return value ? '是' : '否';
    }

    function stateClass(state) {
      if (state === 'patched_update_ready' || state === 'ready') return 'state-good';
      if (state === 'prepare_failed' || state === 'needs_action') return 'state-bad';
      if (state === 'waiting_for_raw_package_source' || state === 'waiting_for_update_payload') return 'state-wait';
      return 'state-info';
    }

    function renderKv(container, rows) {
      container.replaceChildren();
      for (const [label, value] of rows) {
        const k = document.createElement('div');
        k.className = 'k';
        k.textContent = label;
        const v = document.createElement('div');
        v.className = 'v';
        v.textContent = text(value);
        container.append(k, v);
      }
    }

    function restartPrompt(data) {
      return data.State === 'patched_update_ready' || data.Step === 'waiting_for_restart';
    }

    function render(data) {
      byId('errorBox').style.display = 'none';

      const stateLabel = stateNames[data.State] || data.State || '状态未知';
      const stepLabel = stepNames[data.Step] || data.Step || '无';
      const stateValue = byId('stateValue');
      stateValue.textContent = stateLabel;
      stateValue.className = 'value ' + stateClass(data.State);

      byId('stepValue').textContent = stepLabel;
      byId('lastRunValue').textContent = text(data.Task && data.Task.LastRunTime, text(data.CheckedAt));
      byId('safeValue').textContent = data.Safe ? '是' : '否';
      byId('needsActionValue').textContent = data.NeedsAction ? '是' : '否';

      renderKv(byId('taskCard'), [
        ['Event ID', data.EventId],
        ['Current Package Version', data.CurrentPackageVersion],
        ['Candidate Update Version', data.CandidateUpdateVersion],
        ['Update Source', data.UpdateSource],
        ['Current Step', stepLabel],
        ['Last Error Summary', data.LastErrorSummary],
        ['User Action', data.UserAction]
      ]);

      renderKv(byId('metaCard'), [
        ['Mirror Source Enabled', yesNo(data.MirrorSourceEnabled)],
        ['Mirror Package URL', data.MirrorPackageUrl],
        ['Latest Notification', data.LatestNotification && data.LatestNotification.Name],
        ['Task State', data.Task && data.Task.State],
        ['Next Run', data.Task && data.Task.NextRunTime],
        ['Apply Pending', yesNo(data.ApplyPending)],
        ['Desktop Process Count', data.DesktopProcessCount]
      ]);

      byId('userActionBox').textContent = text(data.UserAction, '暂无动作。');
      byId('checkedAtText').textContent = '刷新时间：' + text(data.CheckedAt);

      const commandBox = byId('applyCommandBox');
      if (data.ApplyCommand) {
        commandBox.style.display = 'block';
        commandBox.textContent = data.ApplyCommand;
      } else {
        commandBox.style.display = 'none';
        commandBox.textContent = '';
      }

      const restartBanner = byId('restartBanner');
      if (restartPrompt(data)) {
        restartBanner.style.display = 'block';
        restartBanner.textContent = '现在请关闭并重启 Codex Desktop。补丁更新包已经准备好，接下来请从外部 PowerShell 执行 apply。';
      } else {
        restartBanner.style.display = 'none';
        restartBanner.textContent = '';
      }

      const lines = Array.isArray(data.RecentLog) ? data.RecentLog : [];
      byId('logBox').textContent = lines.length ? lines.join('\n') : '暂无日志';
    }

    function showError(message) {
      const box = byId('errorBox');
      box.style.display = 'block';
      box.textContent = message;
    }

    async function getJson(path) {
      const response = await fetch(path, { cache: 'no-store' });
      if (!response.ok) {
        throw new Error('HTTP ' + response.status);
      }
      const contentType = response.headers.get('content-type') || '';
      if (contentType.includes('application/json')) {
        return response.json();
      }
      return {};
    }

    async function refreshStatus() {
      const button = byId('refreshButton');
      button.disabled = true;
      button.textContent = 'Refreshing';
      try {
        const data = await getJson('/api/status');
        render(data);
      } catch (error) {
        showError('读取状态失败：' + error.message);
      } finally {
        button.disabled = false;
        button.textContent = 'Refresh';
      }
    }

    async function runCheckNow() {
      const button = byId('runCheckButton');
      button.disabled = true;
      button.textContent = 'Running';
      try {
        await getJson('/api/run-check');
      } catch (error) {
        showError('静默触发检查失败：' + error.message);
      } finally {
        button.disabled = false;
        button.textContent = 'Run Check Now';
        window.setTimeout(refreshStatus, 1200);
      }
    }

    async function openPath(path) {
      try {
        await getJson(path);
      } catch (error) {
        showError('打开失败：' + error.message);
      }
    }

    byId('refreshButton').addEventListener('click', refreshStatus);
    byId('runCheckButton').addEventListener('click', runCheckNow);
    byId('openLogsButton').addEventListener('click', () => openPath('/api/open-logs'));
    byId('openStagingButton').addEventListener('click', () => openPath('/api/open-staging'));

    refreshStatus();
    window.setInterval(refreshStatus, 15000);
  </script>
</body>
</html>
